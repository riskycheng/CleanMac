name: CleanMac
targets:
  CleanMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources
    resources:
      - Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.cleanmac.CleanMac
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      SWIFT_VERSION: "6.0"
      ENABLE_USER_SCRIPT_SANDBOXING: NO
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_FILE: ""
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: CleanMac
        CFBundleDisplayName: CleanMac
        CFBundleIdentifier: com.cleanmac.CleanMac
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "© 2026 CleanMac"
        LSUIElement: false
